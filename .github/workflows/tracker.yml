name: Padel tracker

on:
  schedule:
    # offset minuty schválně mimo přetížené */5 (tomu GitHub dává nejnižší prioritu)
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: padel-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Zkontrolovat volné kurty
        run: python3 tracker.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Uložit stav
        run: |
          git add state.json
          # pozor: bez --cached by untracked state.json prošel jako "beze změny"
          if git diff --cached --quiet -- state.json; then
            echo "Stav beze změny."
            exit 0
          fi
          git config user.name "padel-tracker"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Aktualizace stavu"
          # při rebase je -X theirs = náš čerstvý commit; retry kvůli push race
          for attempt in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "Push selhal (pokus $attempt), zkouším znovu…"
            sleep 5
          done
          exit 1
