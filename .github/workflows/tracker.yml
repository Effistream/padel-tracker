name: Padel tracker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: padel-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Zkontrolovat volné kurty
        run: python3 tracker.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Uložit stav
        run: |
          if git diff --quiet state.json; then
            echo "Stav beze změny."
            exit 0
          fi
          git config user.name "padel-tracker"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "Aktualizace stavu"
          git pull --rebase origin main
          git push
