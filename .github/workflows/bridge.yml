name: Bridge scheduler

# Náhrada za GitHubí cron, dokud se neuráčí spouštět sám (u nových repo
# to trvá i hodiny). Jeden běh = hodina kontrol po 5 minutách; na konci se
# znovu spustí přes workflow_dispatch. Jakmile začnou chodit nativní
# scheduled běhy, můstek se sám ukončí a štafetu převezme tracker.yml.
#
# Ruční zastavení: zrušit běžící run (gh run cancel) — bez re-dispatch
# kroku se řetěz přeruší.

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# stejná skupina jako tracker.yml — nativní běhy se řadí za můstek,
# nikdy neběží souběžně (žádné duplicitní notifikace)
concurrency:
  group: padel-tracker
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Hodina kontrol po 5 minutách
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          git config user.name "padel-tracker"
          git config user.email "actions@users.noreply.github.com"
          for i in $(seq 1 12); do
            echo "=== kontrola $i/12 ($(date -u +%H:%M)) ==="
            git pull --rebase -X theirs origin main || true
            python3 tracker.py || echo "::warning::kontrola $i selhala, pokračuji"
            git add state.json
            if ! git diff --cached --quiet -- state.json; then
              git commit -m "Aktualizace stavu" || true
              for attempt in 1 2 3; do
                git pull --rebase -X theirs origin main && git push && break
                echo "Push selhal (pokus $attempt)"; sleep 5
              done
            fi
            # pozor: `[ ... ] && sleep` by u poslední iterace vrátil exit 1
            if [ "$i" -lt 12 ]; then sleep 300; fi
          done

      - name: Předat štafetu, nebo pokračovat
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last=$(gh api "repos/${{ github.repository }}/actions/runs?event=schedule&per_page=1" \
                 --jq '.workflow_runs[0].created_at // empty')
          if [ -n "$last" ]; then
            age=$(( $(date -u +%s) - $(date -u -d "$last" +%s) ))
            if [ "$age" -lt 1200 ]; then
              echo "Nativní cron žije (poslední run před ${age}s) — můstek končí."
              exit 0
            fi
          fi
          echo "Nativní cron stále nespouští — spouštím další hodinu můstku."
          gh workflow run bridge.yml --repo "${{ github.repository }}"
